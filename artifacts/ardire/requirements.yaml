packages:
  "framer-motion": "For elegant page transitions and scroll animations fitting a luxury brand"
  "@hookform/resolvers": "Zod validation for the contact form"

images:
  - path: "artifacts/ardire/public/images/logo.png"
    description: "Minimal elegant geometric letter A logo mark in metallic gold on a completely transparent background"
    aspect_ratio: "1:1"
  - path: "artifacts/ardire/public/images/texture.png"
    description: "Dark moody subtle canvas texture with deep forest green and faint scattered gold dust, abstract luxury background"
    aspect_ratio: "16:9"

notes:
  - This is a purely frontend brochure website with no active backend.
  - The contact form will simulate submission via toast notifications.
  - Using smooth scroll anchors for navigation across the single landing page structure.
