<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>Luxury Private Tours &amp; Event Management | Scotland &amp; Beyond</title>
    <meta name="description" content="Bespoke Scottish concierge, luxury touring, corporate incentives and event management. Árd Íre Hospitality Group — Glasgow's premier private experiences service." />
    <link rel="canonical" href="https://ardire.co.uk/" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ardire.co.uk/" />
    <meta property="og:title" content="Luxury Private Tours &amp; Event Management | Scotland &amp; Beyond" />
    <meta property="og:description" content="Bespoke Scottish concierge, luxury touring, corporate incentives and event management. Árd Íre Hospitality Group — Glasgow's premier private experiences service." />
    <meta property="og:image" content="https://ardire.co.uk/images/opengraph.jpg" />
    <meta property="og:site_name" content="Árdíre Hospitality Group" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Luxury Private Tours &amp; Event Management | Scotland &amp; Beyond" />
    <meta name="twitter:description" content="Bespoke Scottish concierge, luxury touring, corporate incentives and event management. Árd Íre Hospitality Group — Glasgow's premier private experiences service." />
    <meta name="twitter:image" content="https://ardire.co.uk/images/opengraph.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/logo.png" />
    <link rel="apple-touch-icon" href="/images/logo.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Structured Data: LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "Árd Íre Hospitality Group",
      "alternateName": "Árdíre",
      "description": "Bespoke Scottish concierge, luxury touring, corporate incentives and event management based in Glasgow.",
      "url": "https://ardire.co.uk",
      "logo": "https://ardire.co.uk/images/logo.png",
      "image": "https://ardire.co.uk/images/opengraph.jpg",
      "telephone": "+441412550796",
      "email": "enquiries@ardire.co.uk",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Clyde Offices, 2nd Floor, 48 West George Street",
        "addressLocality": "Glasgow",
        "postalCode": "G2 1BP",
        "addressCountry": "GB"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Scotland"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Luxury Scottish Experiences",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Luxury Tours" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Corporate Incentives" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Self-Guided Tours" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Event Staffing" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Concierge and Event Management" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Commonwealth Games 2026 Hospitality" } }
        ]
      },
      "sameAs": [
        "https://www.instagram.com/ardiregroupsocial",
        "https://www.tiktok.com/@ardiregroup"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"><h1 data-crawler-h1 style="font-family:serif;font-size:1.5rem;padding:1rem;color:#0d2b1f">Bespoke Scottish Concierge &amp; Event Management</h1></div>
    <script>
      // Restore URL saved by 404.html SPA fallback before React mounts.
      (function () {
        var redirect = sessionStorage.getItem('spa_redirect');
        if (redirect && redirect !== '/') {
          sessionStorage.removeItem('spa_redirect');
          window.history.replaceState(null, '', redirect);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
