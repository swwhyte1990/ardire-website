<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Árdíre</title>
    <script>
      // SPA fallback: save the full path to sessionStorage, then redirect to root.
      // index.html will read this and restore the URL before React mounts.
      var path = window.location.pathname + window.location.search + window.location.hash;
      sessionStorage.setItem('spa_redirect', path);
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
